---
- name: Determine target user
  ansible.builtin.set_fact:
    ssh_hardening_target_user: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"

- name: Lookup target user home
  ansible.builtin.getent:
    database: passwd
    key: "{{ ssh_hardening_target_user }}"

- name: Ensure ~/.ssh exists
  ansible.builtin.file:
    path: "{{ getent_passwd[ssh_hardening_target_user][4] }}/.ssh"
    state: directory
    mode: "0700"
    owner: "{{ ssh_hardening_target_user }}"
    group: "{{ ssh_hardening_target_user }}"

- name: Ensure known_hosts exists
  ansible.builtin.file:
    path: "{{ getent_passwd[ssh_hardening_target_user][4] }}/.ssh/known_hosts"
    state: touch
    mode: "0644"
    owner: "{{ ssh_hardening_target_user }}"
    group: "{{ ssh_hardening_target_user }}"

- name: Pin known hosts
  ansible.builtin.known_hosts:
    path: "{{ getent_passwd[ssh_hardening_target_user][4] }}/.ssh/known_hosts"
    name: "{{ item.name }}"
    key: "{{ item.key }}"
    state: present
  loop: "{{ ssh_hardening_known_hosts }}"
  when: ssh_hardening_known_hosts | length > 0

- name: Harden SSH client defaults
  ansible.builtin.blockinfile:
    path: "{{ getent_passwd[ssh_hardening_target_user][4] }}/.ssh/config"
    create: true
    owner: "{{ ssh_hardening_target_user }}"
    group: "{{ ssh_hardening_target_user }}"
    mode: "0600"
    marker: "# {mark} ANSIBLE MANAGED SSH HARDENING"
    block: |
      Host *
        HashKnownHosts yes
        StrictHostKeyChecking yes
        UserKnownHostsFile ~/.ssh/known_hosts
        IdentitiesOnly yes
        AddKeysToAgent yes
        ServerAliveInterval 60
        ServerAliveCountMax 3
  when: ssh_hardening_enable_client_config
